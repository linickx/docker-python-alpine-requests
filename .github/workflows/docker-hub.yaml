name: Docker Build, Test, SBOM, Scan & Push

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the repository
        uses: actions/checkout@v6
      - name: Build the Docker image
        run: docker build . --file Dockerfile -t ${{ vars.DOCKERHUB_USERNAME }}/python-alpine-requests:latest
      - name: Test the Build/Image
        run: docker run --rm -v ./test.py:/test.py -t ${{ vars.DOCKERHUB_USERNAME }}/python-alpine-requests:latest /test.py
      - name: Create SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ${{ vars.DOCKERHUB_USERNAME }}/python-alpine-requests:latest
          format: spdx-json
          output-file: SBOM.spdx.json
      - name: Scan image
        uses: anchore/scan-action@v7
        with:
          image: ${{ vars.DOCKERHUB_USERNAME }}/python-alpine-requests:latest
          fail-build: false
          output-format: table
          output-file: grype.txt
      - name: Write SCAN Report
        run: |
            cat .github/SCAN-Template.md > SCAN.md
            echo >> SCAN.md
            echo "---" >> SCAN.md
            date +'%m-%d-%Y %T' >> SCAN.md
            echo "---" >> SCAN.md
            echo '````' >> SCAN.md
            cat grype.txt >> SCAN.md
            echo '````' >> SCAN.md
      - run: rm -f grype.txt
      - name: Upload SBOM & SCAN to git
        run: |
            git config --global user.name "${{ github.actor }}"
            git config --global user.email "${{ github.actor }}@users.noreply.github.com"
            git add SCAN.md SBOM.spdx.json
            git commit -m "SBOM & SCAN Report $(date +'%m-%d-%Y %T')"
            git push
      - name: SBOM upload to GitHub API
        uses: advanced-security/spdx-dependency-submission-action@v0.2.0
        with:
          filePath: ./
      - name: Login to DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Push Docker image - Latest
        run: docker push ${{ vars.DOCKERHUB_USERNAME }}/python-alpine-requests:latest
      - name: Logout from Docker Hub
        run: docker logout